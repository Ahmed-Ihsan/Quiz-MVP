schema: spec-driven

context: |
  المشروع: منصة اختبار تفاعلي محلية (local) عن الأردوينو وبايثون وإنترنت الأشياء.
  اللغة: كل المحتوى والواجهة باللغة العربية مع دعم RTL كامل.
  التقنيات:
    - Backend: Python Flask
    - Frontend: HTML + CSS + JavaScript عادي (بدون framework)
    - التخزين: SQLite لنتائج المستخدمين وسجلات التقدّم (quiz.db)، JSON للأسئلة (questions.json مُولّد من content.text)
  مصدر الأسئلة: ملف content.text يحتوي على بنك أسئلة بالعربية (MCQ + أسئلة عملية).
  النطاق: أسئلة اختيارات (MCQ) فقط — يتم استبعاد الأسئلة العملية (أخطاء التوصيل + تصميم مشروع).
  الميزات:
    - تسجيل دخول بسيط بالاسم (بدون كلمة مرور)
    - عرض الأسئلة مع الخيارات
    - تصحيح تلقائي وحساب النتيجة
    - حفظ النتائج وعرضها
    - مراجعة الإجابات الخاطئة
  القيود:
    - يعمل محليًا على http://localhost:5000
    - بسيط وخفيف بدون تعقيد
    - كل النصوص بالعربية

rules:
  proposal:
    - اكتب الـ proposal بالعربية
    - اذكر بوضوح الأسئلة العملية المستبعدة
  specs:
    - كل المتطلبات والسيناريوهات بالعربية
    - استخدم SHALL/MUST في وصف المتطلبات
  tasks:
    - قسّم المهام إلى مجموعات صغيرة قابلة للتحقق
    - أضف مهمة تحقق بعد كل مرحلة
